<div class="admin-members-container">
    <h2 class="section-title">Manajemen Anggota</h2>

    <!-- Mobile View: Card List -->
    <div class="members-card-list" id="members-cards">
        <!-- Cards will be loaded here -->
    </div>

    <!-- Desktop View: Table -->
    <div class="glass-panel members-table-wrapper">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="members-list">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Member Modal -->
<div id="member-modal" class="custom-modal-overlay">
    <div class="custom-modal-box member-modal-width">
        <button class="custom-modal-close member-modal-close" onclick="closeMemberModal()">✕</button>
        <div class="custom-modal-body">
            <h2 id="member-modal-title">Edit Pengguna</h2>
            <div class="modal-divider"></div>
            <form id="member-form" onsubmit="saveMember(event)">
                <input type="hidden" id="member-uid">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="member-nama" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" id="member-email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="member-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="auth-btn-submit">Simpan Perubahan</button>
            </form>
        </div>
    </div>
</div>
