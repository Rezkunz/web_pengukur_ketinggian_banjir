                <h2 class="section-title">Saran & Masukan</h2>
                <div class="glass-panel form-panel">
                    <p class="form-desc">Bantu kami meningkatkan sistem monitoring banjir ini.</p>
                    <form id="form-saran" onsubmit="submitSaran(event)">
                        <div class="form-group">
                            <label>Email (Opsional)</label>
                            <input type="email" id="saran-email" placeholder="email@contoh.com">
                        </div>
                        <div class="form-group">
                            <label>Pesan Masukan</label>
                            <textarea id="saran-pesan" rows="4" placeholder="Ketik saran dan masukan Anda di sini..."
                                required></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Kirim Saran</button>
                    </form>
                </div>
