                <h2 class="section-title">Monitoring Real-Time</h2>

                <!-- ══ SENSOR OFFLINE BANNER ══ -->
                <div class="offline-banner" id="offline-banner-user">
                    <div class="offline-icon-wrap">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20.5 2l-1.5 1.5L17.5 2 16 3.5 17.5 5 16 6.5 17.5 8l1.5-1.5L20.5 8 22 6.5 20.5 5 22 3.5zM12 3C7.95 3 4.21 4.34 1.2 6.6L3 8.4C5.57 6.5 8.66 5.4 12 5.4c.78 0 1.55.07 2.29.21l2.1-2.1C15.03 3.19 13.54 3 12 3zm-9.8 1.2L.7 5.7 2.5 7.5C1.59 8.1.73 8.77 0 9.53L1.77 11.3C2.68 10.36 3.73 9.56 4.88 8.92L3.2 7.24C2.85 7.04 2.51 6.83 2.2 6.6zM12 8a11.93 11.93 0 00-7.03 2.27l1.77 1.77C8.12 10.76 10 10 12 10c1.42 0 2.74.39 3.88 1.04l2.05-2.05A9.93 9.93 0 0012 8zm0 4c-1.07 0-2.05.34-2.84.9l1.78 1.78c.34-.1.7-.18 1.06-.18.98 0 1.85.4 2.5 1.04l1.77-1.77C15.27 12.68 13.72 12 12 12zm0 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
                        </svg>
                    </div>
                    <div class="offline-text">
                        <strong>⚠️ Sensor Tidak Terdeteksi</strong>
                        <span id="offline-duration-user">Data terakhir diterima lebih dari 5 menit yang lalu</span>
                    </div>
                    <div class="offline-dot"></div>
                </div>

                <!-- Water Visualization -->
                <section class="water-container glass-panel">
                    <div class="water-tank-wrapper">
                        <div class="water-tank" id="water-tank">
                            <div class="water-fill" id="water-fill">
                                <!-- SVG Wave lebih smooth -->
                                <div class="wave-container">
                                    <svg class="wave-svg" viewBox="0 0 1200 22" preserveAspectRatio="none">
                                        <path d="M0,11 C150,22 350,0 600,11 C850,22 1050,0 1200,11 L1200,22 L0,22 Z"/>
                                    </svg>
                                    <svg class="wave-svg-2" viewBox="0 0 1200 22" preserveAspectRatio="none" style="fill:inherit;">
                                        <path d="M0,11 C200,0 400,22 600,11 C800,0 1000,22 1200,11 L1200,22 L0,22 Z"/>
                                    </svg>
                                </div>
                                <!-- Ripple effect -->
                                <div class="water-ripple"></div>
                                <div class="water-ripple"></div>
                                <div class="water-ripple"></div>
                                <!-- Bubbles -->
                                <div class="bubble" style="width:6px;height:6px;left:25%;--dur:3.2s;--delay:0s;"></div>
                                <div class="bubble" style="width:4px;height:4px;left:60%;--dur:2.5s;--delay:1s;"></div>
                                <div class="bubble" style="width:5px;height:5px;left:45%;--dur:4s;--delay:0.5s;"></div>
                                <div class="bubble" style="width:3px;height:3px;left:75%;--dur:3s;--delay:1.8s;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="level-info">
                        <h3>Tinggi Air</h3>
                        <div class="level-value">
                            <span id="current-level">0</span>
                            <span class="unit">cm</span>
                        </div>
                    </div>
                </section>

                <!-- Status Alert -->
                <section class="alert-section glass-panel" id="alert-panel">
                    <div class="alert-icon" id="alert-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32"
                            height="32">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM12 18a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm1-5h-2V7h2v6z" />
                        </svg>
                    </div>
                    <div class="alert-text">
                        <h3>Status Level</h3>
                        <p id="alert-message">Aman</p>
                    </div>
                </section>

                <!-- Debit Chart -->
                <section class="chart-section glass-panel">
                    <h3>Grafik Ketinggian Air (Per 15 Menit)</h3>
                    <div class="chart-container">
                        <canvas id="waterChart"></canvas>
                    </div>
                </section>

                <p class="refresh-time">Terakhir diperbarui: <span id="last-update">-</span></p>
