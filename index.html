<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE (Sistem Aplikasi Flood Early Warning)</title>

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com;
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.gstatic.com https://cdnjs.cloudflare.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://*.googleapis.com https://*.firebasedatabase.app wss://*.firebasedatabase.app;
        frame-src 'none';
        object-src 'none';
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- App Icons (Google Search Favicon) -->
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0f4f8">
    
    <!-- SEO & Google Search Console -->
    <meta name="description" content="SAFE (Sistem Aplikasi Flood Early Warning) - Sistem peringatan dan monitoring ketinggian air realtime. Pantau status banjir dengan cepat dan akurat.">
    <meta name="keywords" content="SAFE, Sistem Aplikasi Flood Early Warning, monitoring banjir, peringatan dini banjir, deteksi banjir, air realtime, safetelu">
    <meta name="author" content="SAFE Team">
    <link rel="canonical" href="https://www.safetelu.my.id/" />
    <meta name="google-site-verification" content="rVKAx3JKfzCn2gCBJ4EQRBmK7vRPQ0eSN3GOIUuzLOg" />

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="SAFE (Sistem Aplikasi Flood Early Warning)">
    <meta property="og:description" content="Sistem peringatan dan monitoring ketinggian air realtime. Pantau status banjir dengan cepat dan akurat.">
    <meta property="og:image" content="https://www.safetelu.my.id/logo.png">
    <meta property="og:url" content="https://www.safetelu.my.id/">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SAFE - Sistem Aplikasi Flood Early Warning">
    <meta name="twitter:description" content="Pantau ketinggian air secara realtime dengan sistem peringatan dini banjir SAFE.">
    <meta name="twitter:image" content="https://www.safetelu.my.id/logo.png">

    <!-- Structured Data (JSON-LD) for Google Rich Snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SAFE (Sistem Aplikasi Flood Early Warning)",
      "url": "https://www.safetelu.my.id/",
      "description": "Sistem peringatan dini dan monitoring banjir realtime menggunakan sensor ultrasonik dan NodeMCU.",
      "applicationCategory": "Public Safety Application",
      "operatingSystem": "Web Browser",
      "author": {
        "@type": "Organization",
        "name": "SAFE Team"
      }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/base.css?v=14">
    <link rel="stylesheet" href="css/components.css?v=14">
    <link rel="stylesheet" href="css/monitoring.css?v=14">
</head>

<body>
    <!-- Global Splash/Loading Screen -->
    <div id="global-loader" class="global-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <h2>SAFE</h2>
            <p>Memuat Sistem...</p>
        </div>
    </div>

    <!-- Inline Fail-safe to ensure loader disappears -->
    <script>
        setTimeout(function() {
            var loader = document.getElementById('global-loader');
            if (loader && loader.style.display !== 'none') {
                console.warn("Fail-safe: Hiding loader after timeout.");
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                setTimeout(function() { loader.style.display = 'none'; }, 500);
            }
        }, 7000);
    </script>

    <div class="app-container">

        <!-- Header -->
        <header>
            <div class="header-logo" style="display: flex; align-items: center; gap: 12px;">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Logo SAFE" width="36" height="36" style="border-radius: 50%;">
                </div>
                <h1 style="margin: 0; font-size: 1.25rem;">SAFE</h1>
            </div>
            
            <!-- User Profile Dropdown -->
            <div class="profile-menu-wrapper" style="display: none;" id="profile-wrapper">
                <div class="profile-trigger" id="profile-trigger" onclick="toggleProfileMenu()" role="button" tabindex="0" aria-label="Toggle Profile Menu" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <div class="profile-avatar" id="header-avatar" style="background: linear-gradient(135deg, #3498db, #2c3e50); color:#fff; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">U</div>
                    <span id="header-name" style="font-weight:600; color: #333;">User</span>
                </div>
                <div class="profile-dropdown" id="profile-dropdown" style="display: none; position: absolute; top: 70px; right: 20px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 150px; z-index: 1000; overflow: hidden; color: #333;">
                    <ul style="list-style: none; margin: 0; padding: 0;">
                        <li style="padding: 10px 20px; border-bottom: 1px solid #eee; cursor: pointer;" onclick="openEditProfile()">Edit Profile</li>
                        <li style="padding: 10px 20px; color: #e74c3c; cursor: pointer;" onclick="logoutUser()">Log Out</li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- USER NAVIGATION -->
        <nav class="bottom-nav" id="user-navbar" style="display: none;">

            <!-- Brand: hanya tampil di sidebar desktop (hidden di mobile via CSS) -->
            <div class="sidebar-brand">
                <img src="logo.png" alt="Logo" class="sidebar-logo">
                <span class="sidebar-title">SAFE</span>
            </div>

            <!-- Nav Items -->
            <div class="nav-item active" data-target="view-monitoring" role="button" tabindex="0" aria-label="Navigasi Monitor">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3L2 12h3v8h14v-8h3L12 3zm0 2.83l7 6.17v6h-14v-6l7-6.17z" />
                </svg>
                <span>Monitor</span>
            </div>
            <div class="nav-item" data-target="view-darurat" role="button" tabindex="0" aria-label="Navigasi Darurat">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v16h20V4c0-1.1-.9-2-2-2zM9 18H7v-4H3v-2h4V8h2v4h4v2H9v4z" />
                </svg>
                <span>Darurat</span>
            </div>
            <div class="nav-item" data-target="view-lapor" role="button" tabindex="0" aria-label="Navigasi Lapor">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                </svg>
                <span>Lapor</span>
            </div>
            <div class="nav-item" data-target="view-saran" role="button" tabindex="0" aria-label="Navigasi Saran">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z" />
                </svg>
                <span>Saran</span>
            </div>

            <!-- Profile Section: hanya tampil di sidebar desktop -->
            <div class="sidebar-profile" id="sidebar-profile-user">
                <div class="sidebar-profile-trigger" onclick="toggleSidebarProfileMenu('user')" role="button" tabindex="0" aria-label="Toggle Sidebar Profile Menu">
                    <div class="sidebar-avatar" id="sidebar-avatar-user">U</div>
                    <div class="sidebar-profile-info">
                        <span class="sidebar-profile-name" id="sidebar-name-user">User</span>
                        <span class="sidebar-profile-role">Pengguna</span>
                    </div>
                    <svg viewBox="0 0 24 24" class="sidebar-chevron"><path d="M7 10l5 5 5-5z"/></svg>
                </div>
                <div class="sidebar-profile-dropdown" id="sidebar-dd-user">
                    <div class="sidebar-dd-item" onclick="openEditProfile()">✏️ Edit Profile</div>
                    <div class="sidebar-dd-item sidebar-dd-logout" onclick="logoutUser()">🚪 Log Out</div>
                </div>
            </div>

        </nav>

        <!-- ADMIN NAVIGATION -->
        <nav class="bottom-nav" id="admin-navbar" style="display: none;">

            <!-- Brand: hanya tampil di sidebar desktop -->
            <div class="sidebar-brand">
                <img src="logo.png" alt="Logo" class="sidebar-logo">
                <span class="sidebar-title">SAFE</span>
            </div>

            <!-- Nav Items -->
            <div class="nav-item active" data-target="view-admin-dashboard" role="button" tabindex="0" aria-label="Navigasi Admin Dashboard">
                <span>🎛️</span>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" data-target="view-admin-laporan" role="button" tabindex="0" aria-label="Navigasi Admin Laporan">
                <span>📋</span>
                <span>Laporan</span>
            </div>
            <div class="nav-item" data-target="view-admin-saran" role="button" tabindex="0" aria-label="Navigasi Admin Saran">
                <span>📬</span>
                <span>Feedback</span>
            </div>

            <!-- Profile Section: hanya tampil di sidebar desktop -->
            <div class="sidebar-profile" id="sidebar-profile-admin">
                <div class="sidebar-profile-trigger" onclick="toggleSidebarProfileMenu('admin')" role="button" tabindex="0" aria-label="Toggle Sidebar Profile Menu">
                    <div class="sidebar-avatar" id="sidebar-avatar-admin">A</div>
                    <div class="sidebar-profile-info">
                        <span class="sidebar-profile-name" id="sidebar-name-admin">Admin</span>
                        <span class="sidebar-profile-role">Administrator</span>
                    </div>
                    <svg viewBox="0 0 24 24" class="sidebar-chevron"><path d="M7 10l5 5 5-5z"/></svg>
                </div>
                <div class="sidebar-profile-dropdown" id="sidebar-dd-admin">
                    <div class="sidebar-dd-item" onclick="openEditProfile()">✏️ Edit Profile</div>
                    <div class="sidebar-dd-item sidebar-dd-logout" onclick="logoutUser()">🚪 Log Out</div>
                </div>
            </div>

        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="content-area">

            <!-- AUTH VIEW -->
            <div id="view-auth" class="view-section"></div>

            <!-- VIEW 1: MONITORING BANJIR -->
            <div id="view-monitoring" class="view-section"></div>

            <!-- VIEW 2: KONTAK DARURAT -->
            <div id="view-darurat" class="view-section"></div>

            <!-- VIEW 3: LAPOR KEJADIAN -->
            <div id="view-lapor" class="view-section"></div>

            <!-- VIEW 4: SARAN & MASUKAN -->
            <div id="view-saran" class="view-section"></div>

            <!-- VIEW ADMIN: DASHBOARD -->
            <div id="view-admin-dashboard" class="view-section"></div>

            <!-- VIEW ADMIN: LAPORAN -->
            <div id="view-admin-laporan" class="view-section"></div>

            <!-- VIEW ADMIN: SARAN -->
            <div id="view-admin-saran" class="view-section"></div>

            <!-- VIEW SHARED: EDIT PROFILE -->
            <div id="view-edit-profile" class="view-section"></div>

        </main>

    </div>

    <!-- Custom Popup Modal -->
    <div class="custom-modal-overlay" id="custom-modal">
        <div class="custom-modal-box">
            <button class="custom-modal-close" onclick="closeCustomModal()">✕</button>
            <div class="custom-modal-header" id="modal-header">
                <!-- Wave removed for clean modern design -->
                <!-- Warning icon -->
                <svg viewBox="0 0 24 24" class="modal-icon">
                    <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
                </svg>
            </div>
            <div class="custom-modal-body">
                <h2 id="modal-title">Warning!</h2>
                <p id="modal-desc">Message goes here...</p>
                <button class="btn-modal-action" onclick="closeCustomModal()">MENGERTI</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="custom-modal-overlay" id="success-modal" onclick="closeSuccessModal(event)">
        <div class="success-modal-box" onclick="event.stopPropagation()">
            <button class="custom-modal-close" style="background: #f0f0f0; color: #999;"
                onclick="closeSuccessModal()">✕</button>
            <div class="success-icon-wrapper">
                <div class="success-icon-glow"></div>
                <div class="success-icon-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>
            <h2 id="success-modal-title">Success</h2>
            <p id="success-modal-desc">Your action was successful.</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <!-- Custom JS -->
    <script src="backend/firebase-config.js?v=20"></script>
    <script src="backend/ui.js?v=20"></script>
    <script src="backend/auth.js?v=20"></script>
    <script src="backend/monitoring.js?v=20"></script>
    <script src="backend/reports.js?v=20"></script>
    <script src="backend/main.js?v=20"></script>
</body>

</html>
